name: Release Production

on:
  push:
    branches: [main]

concurrency:
  group: release-production
  cancel-in-progress: false

jobs:
  check:
    name: Check if release needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version from tags
        id: check
        run: |
          LATEST_BETA=$(git tag -l 'v*-beta.*' --merged HEAD | sort -V | tail -1 || echo "")

          if [ -z "$LATEST_BETA" ]; then
            echo "No beta tags found on HEAD, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION=$(echo "$LATEST_BETA" | sed 's/^v//; s/-beta\.[0-9]*//')

          if git tag -l "v${VERSION}" | grep -q .; then
            echo "Production tag v${VERSION} already exists, skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will release v${VERSION} (from $LATEST_BETA)"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  release:
    name: Release (production)
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_release == 'true'
    outputs:
      desktop_changed: ${{ steps.changes.outputs.desktop_changed }}
      server_changed: ${{ steps.changes.outputs.server_changed }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect changes since last production tag
        id: changes
        run: |
          LAST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v '-' | sort -V | tail -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "server_changed=true" >> "$GITHUB_OUTPUT"
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVER_CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- apps/server/ packages/ install.sh 2>/dev/null)
          DESKTOP_CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- apps/desktop/ apps/web/ packages/ 2>/dev/null)

          echo "server_changed=$( [ -n "$SERVER_CHANGED" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "desktop_changed=$( [ -n "$DESKTOP_CHANGED" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Inject version and create tag
        id: version
        run: |
          VERSION="${{ needs.check.outputs.version }}"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./apps/server/package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('./apps/server/package.json', JSON.stringify(pkg, null, 2) + '\n');

            const tauriConf = JSON.parse(fs.readFileSync('./apps/desktop/src-tauri/tauri.conf.json', 'utf8'));
            tauriConf.version = '${VERSION}';
            fs.writeFileSync('./apps/desktop/src-tauri/tauri.conf.json', JSON.stringify(tauriConf, null, 2) + '\n');

            const cargo = fs.readFileSync('./apps/desktop/src-tauri/Cargo.toml', 'utf8');
            fs.writeFileSync('./apps/desktop/src-tauri/Cargo.toml',
              cargo.replace(/^version = \".*\"/m, 'version = \"${VERSION}\"'));
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build server
        if: steps.changes.outputs.server_changed == 'true'
        run: pnpm --filter @minuthq/huxflux build

      - name: Build and bundle web UI into server
        if: steps.changes.outputs.server_changed == 'true'
        run: |
          pnpm --filter huxflux-web build
          mkdir -p apps/server/dist/web
          cp -r apps/web/dist/* apps/server/dist/web/

      - name: Publish to npm (latest tag)
        if: steps.changes.outputs.server_changed == 'true'
        run: |
          echo "@minuthq:registry=https://npm.pkg.github.com" > apps/server/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> apps/server/.npmrc
          cd apps/server
          npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          echo "## Production Release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.changes.outputs.server_changed }}" = "true" ]; then
            echo "Published \`@minuthq/huxflux@${VERSION}\` to npm as \`latest\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Server publish skipped (no server changes since last production tag)." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.changes.outputs.desktop_changed }}" != "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Desktop build skipped (no desktop/web changes since last production tag)." >> "$GITHUB_STEP_SUMMARY"
          fi

  desktop-macos:
    name: Build desktop (macOS)
    runs-on: macos-latest
    needs: [check, release]
    if: needs.check.outputs.should_release == 'true' && needs.release.outputs.desktop_changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject version
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          node -e "
            const fs = require('fs');
            const tauriConf = JSON.parse(fs.readFileSync('./apps/desktop/src-tauri/tauri.conf.json', 'utf8'));
            tauriConf.version = '${VERSION}';
            fs.writeFileSync('./apps/desktop/src-tauri/tauri.conf.json', JSON.stringify(tauriConf, null, 2) + '\n');

            const cargo = fs.readFileSync('./apps/desktop/src-tauri/Cargo.toml', 'utf8');
            fs.writeFileSync('./apps/desktop/src-tauri/Cargo.toml',
              cargo.replace(/^version = \".*\"/m, 'version = \"${VERSION}\"'));
          "

      - name: Build macOS ARM
        run: cd apps/desktop && pnpm tauri build --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build macOS Intel
        run: cd apps/desktop && pnpm tauri build --target x86_64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare and upload artifacts
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          TARGET="$GITHUB_WORKSPACE/apps/desktop/src-tauri/target"

          ARM_DMG=$(find "$TARGET/aarch64-apple-darwin/release/bundle/dmg" -name "*.dmg" | head -1)
          X64_DMG=$(find "$TARGET/x86_64-apple-darwin/release/bundle/dmg" -name "*.dmg" | head -1)
          cp "$ARM_DMG" "/tmp/Huxflux-macos-arm.dmg"
          cp "$X64_DMG" "/tmp/Huxflux-macos-intel.dmg"

          ARM_BUNDLE="$TARGET/aarch64-apple-darwin/release/bundle/macos"
          X64_BUNDLE="$TARGET/x86_64-apple-darwin/release/bundle/macos"
          ARM_TAR="${ARM_BUNDLE}/Huxflux_${VERSION}_aarch64.app.tar.gz"
          X64_TAR="${X64_BUNDLE}/Huxflux_${VERSION}_x64.app.tar.gz"
          (cd "$ARM_BUNDLE" && COPYFILE_DISABLE=1 tar -czf "$ARM_TAR" "Huxflux.app")
          (cd "$X64_BUNDLE" && COPYFILE_DISABLE=1 tar -czf "$X64_TAR" "Huxflux.app")

          cd apps/desktop
          pnpm tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$ARM_TAR"
          pnpm tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$X64_TAR"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            /tmp/Huxflux-macos-arm.dmg
            /tmp/Huxflux-macos-intel.dmg
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz.sig
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz.sig

  desktop-linux:
    name: Build desktop (Linux)
    runs-on: ubuntu-latest
    needs: [check, release]
    if: needs.check.outputs.should_release == 'true' && needs.release.outputs.desktop_changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject version
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          node -e "
            const fs = require('fs');
            const tauriConf = JSON.parse(fs.readFileSync('./apps/desktop/src-tauri/tauri.conf.json', 'utf8'));
            tauriConf.version = '${VERSION}';
            fs.writeFileSync('./apps/desktop/src-tauri/tauri.conf.json', JSON.stringify(tauriConf, null, 2) + '\n');

            const cargo = fs.readFileSync('./apps/desktop/src-tauri/Cargo.toml', 'utf8');
            fs.writeFileSync('./apps/desktop/src-tauri/Cargo.toml',
              cargo.replace(/^version = \".*\"/m, 'version = \"${VERSION}\"'));
          "

      - name: Build Linux
        run: cd apps/desktop && pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare artifacts
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          TARGET="$GITHUB_WORKSPACE/apps/desktop/src-tauri/target"
          APPIMAGE=$(find "$TARGET/release/bundle/appimage" -name "*.AppImage" | head -1)
          DEB=$(find "$TARGET/release/bundle/deb" -name "*.deb" | head -1)
          cp "$APPIMAGE" "/tmp/Huxflux-linux-x86_64.AppImage"
          cp "$DEB" "/tmp/Huxflux-linux-amd64.deb"

          LINUX_TAR="/tmp/Huxflux_${VERSION}_x86_64.AppImage.tar.gz"
          (cd "$(dirname "$APPIMAGE")" && tar -czf "$LINUX_TAR" "$(basename "$APPIMAGE")")

          cd apps/desktop
          pnpm tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$LINUX_TAR"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            /tmp/Huxflux-linux-x86_64.AppImage
            /tmp/Huxflux-linux-amd64.deb
            /tmp/Huxflux_*.AppImage.tar.gz
            /tmp/Huxflux_*.AppImage.tar.gz.sig

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    if: always() && needs.check.outputs.should_release == 'true' && needs.release.result == 'success'
    needs: [check, release, desktop-macos, desktop-linux]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        if: needs.desktop-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          TAG="v${VERSION}"

          EXTRA_FILES=""
          for PTAG in $(gh release list --repo "${{ github.repository }}" --limit 20 --json tagName,isPrerelease -q '.[] | select(.isPrerelease) | .tagName'); do
            BETA_MANIFEST=$(curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${PTAG}/latest-beta.json" 2>/dev/null || echo "")
            if [ -n "$BETA_MANIFEST" ]; then
              echo "$BETA_MANIFEST" > latest-beta.json
              EXTRA_FILES="latest-beta.json"
              break
            fi
          done

          if [ -d "artifacts" ]; then
            BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
            PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            ARM_SIG_FILE=$(find artifacts/macos-artifacts -name "*aarch64.app.tar.gz.sig" 2>/dev/null | head -1)
            X64_SIG_FILE=$(find artifacts/macos-artifacts -name "*x64.app.tar.gz.sig" 2>/dev/null | head -1)
            LINUX_SIG_FILE=$(find artifacts/linux-artifacts -name "*AppImage.tar.gz.sig" 2>/dev/null | head -1)
            ARM_SIG=$([ -f "$ARM_SIG_FILE" ] && cat "$ARM_SIG_FILE" | tr -d '\n' || echo "")
            X64_SIG=$([ -f "$X64_SIG_FILE" ] && cat "$X64_SIG_FILE" | tr -d '\n' || echo "")
            LINUX_SIG=$([ -f "$LINUX_SIG_FILE" ] && cat "$LINUX_SIG_FILE" | tr -d '\n' || echo "")

            printf '{"version":"%s","notes":"","pub_date":"%s","platforms":{"darwin-aarch64":{"signature":"%s","url":"%s/Huxflux_%s_aarch64.app.tar.gz"},"darwin-x86_64":{"signature":"%s","url":"%s/Huxflux_%s_x64.app.tar.gz"},"linux-x86_64":{"signature":"%s","url":"%s/Huxflux_%s_x86_64.AppImage.tar.gz"}}}\n' \
              "$VERSION" "$PUB_DATE" \
              "$ARM_SIG" "$BASE_URL" "$VERSION" \
              "$X64_SIG" "$BASE_URL" "$VERSION" \
              "$LINUX_SIG" "$BASE_URL" "$VERSION" > latest.json

            FILES=$(find artifacts -type f -not -name "*.sig" | tr '\n' ' ')
            SIG_FILES=$(find artifacts -name "*.sig" | tr '\n' ' ')

            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Huxflux ${TAG}" \
              --notes "The macOS app is unsigned. Right-click the .dmg and select Open to bypass Gatekeeper." \
              $FILES $SIG_FILES latest.json $EXTRA_FILES
          else
            PREV_STABLE=$(curl -fsSL "https://github.com/${{ github.repository }}/releases/latest/download/latest.json" 2>/dev/null || echo "")
            if [ -n "$PREV_STABLE" ]; then
              echo "$PREV_STABLE" > latest.json
              EXTRA_FILES="latest.json $EXTRA_FILES"
            fi

            if [ -n "$EXTRA_FILES" ]; then
              gh release create "$TAG" \
                --repo "${{ github.repository }}" \
                --title "Huxflux ${TAG}" \
                --notes "Server-only release. Install with: \`npm install -g @minuthq/huxflux@latest\`" \
                $EXTRA_FILES
            else
              gh release create "$TAG" \
                --repo "${{ github.repository }}" \
                --title "Huxflux ${TAG}" \
                --notes "Server-only release. Install with: \`npm install -g @minuthq/huxflux@latest\`"
            fi
          fi
