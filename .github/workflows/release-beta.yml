name: Release Beta

on:
  workflow_dispatch:

concurrency:
  group: release-beta
  cancel-in-progress: false

jobs:
  release:
    name: Release (beta)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      desktop_changed: ${{ steps.changes.outputs.desktop_changed }}
      server_changed: ${{ steps.changes.outputs.server_changed }}
    permissions:
      contents: write
      packages: write
    if: github.ref == 'refs/heads/beta'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST_PROD=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v '-' | sort -V | tail -1 || echo "")
          LATEST_BETA=$(git tag -l 'v*-beta.*' | sort -V | tail -1 || echo "")

          PROD_VER=$(echo "$LATEST_PROD" | sed 's/^v//')

          if [ -z "$LATEST_PROD" ] && [ -z "$LATEST_BETA" ]; then
            VERSION="0.1.0-beta.1"
          elif [ -z "$LATEST_BETA" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$PROD_VER"
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-beta.1"
          else
            BETA_BASE=$(echo "$LATEST_BETA" | sed 's/^v//; s/-beta\.[0-9]*//')
            BETA_NUM=$(echo "$LATEST_BETA" | sed 's/.*-beta\.//')

            NEEDS_BUMP=false
            if [ -n "$PROD_VER" ]; then
              HIGHER=$(printf '%s\n%s' "$PROD_VER" "$BETA_BASE" | sort -V | tail -1)
              if [ "$HIGHER" = "$PROD_VER" ] && [ "$PROD_VER" != "$BETA_BASE" ]; then
                NEEDS_BUMP=true
                BASE="$PROD_VER"
              elif [ "$BETA_BASE" = "$PROD_VER" ]; then
                NEEDS_BUMP=true
                BASE="$PROD_VER"
              fi
            fi

            if [ "$NEEDS_BUMP" = "true" ]; then
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-beta.1"
            else
              VERSION="${BETA_BASE}-beta.$((BETA_NUM + 1))"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Detect changes since last tag
        id: changes
        run: |
          LAST_TAG=$(git tag -l 'v*' | sort -V | tail -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "server_changed=true" >> "$GITHUB_OUTPUT"
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVER_CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- apps/server/ packages/ install.sh 2>/dev/null)
          DESKTOP_CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- apps/desktop/ apps/web/ packages/ .github/workflows/release-beta.yml 2>/dev/null)

          echo "server_changed=$( [ -n "$SERVER_CHANGED" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "desktop_changed=$( [ -n "$DESKTOP_CHANGED" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          if git tag -l "$TAG" | grep -q .; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Setup pnpm
        if: steps.changes.outputs.server_changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        if: steps.changes.outputs.server_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        if: steps.changes.outputs.server_changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Inject version
        if: steps.changes.outputs.server_changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./apps/server/package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('./apps/server/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build server
        if: steps.changes.outputs.server_changed == 'true'
        run: pnpm --filter @minuthq/huxflux build

      - name: Build and bundle web UI into server
        if: steps.changes.outputs.server_changed == 'true'
        run: |
          pnpm --filter huxflux-web build
          mkdir -p apps/server/dist/web
          cp -r apps/web/dist/* apps/server/dist/web/

      - name: Verify build
        if: steps.changes.outputs.server_changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CLI_VERSION=$(node apps/server/dist/cli.js --version)
          if [ "$CLI_VERSION" != "$VERSION" ]; then
            echo "Version mismatch: expected $VERSION, got $CLI_VERSION"
            exit 1
          fi

      - name: Publish to npm (beta tag)
        if: steps.changes.outputs.server_changed == 'true'
        run: |
          echo "@minuthq:registry=https://npm.pkg.github.com" > apps/server/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> apps/server/.npmrc
          cd apps/server
          npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Beta Release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.changes.outputs.server_changed }}" = "true" ]; then
            echo "Published \`@minuthq/huxflux@${{ steps.version.outputs.version }}\` to npm with \`beta\` tag." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Server publish skipped (no server changes since last tag)." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.changes.outputs.desktop_changed }}" != "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Desktop build skipped (no desktop/web changes since last tag)." >> "$GITHUB_STEP_SUMMARY"
          fi

  desktop-macos:
    name: Build desktop (macOS)
    runs-on: macos-latest
    if: needs.release.result == 'success' && needs.release.outputs.desktop_changed == 'true'
    needs: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: beta

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject version
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          DESKTOP_VERSION="$VERSION"
          node -e "
            const fs = require('fs');
            const tauriConf = JSON.parse(fs.readFileSync('./apps/desktop/src-tauri/tauri.conf.json', 'utf8'));
            tauriConf.version = '${DESKTOP_VERSION}';
            fs.writeFileSync('./apps/desktop/src-tauri/tauri.conf.json', JSON.stringify(tauriConf, null, 2) + '\n');

            const cargo = fs.readFileSync('./apps/desktop/src-tauri/Cargo.toml', 'utf8');
            fs.writeFileSync('./apps/desktop/src-tauri/Cargo.toml',
              cargo.replace(/^version = \".*\"/m, 'version = \"${DESKTOP_VERSION}\"'));
          "

      - name: Build macOS ARM
        run: cd apps/desktop && pnpm tauri build --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build macOS Intel
        run: cd apps/desktop && pnpm tauri build --target x86_64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare artifacts
        id: artifacts
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          TAG="v${VERSION}"
          TARGET="$GITHUB_WORKSPACE/apps/desktop/src-tauri/target"

          ARM_DMG=$(find "$TARGET/aarch64-apple-darwin/release/bundle/dmg" -name "*.dmg" | head -1)
          X64_DMG=$(find "$TARGET/x86_64-apple-darwin/release/bundle/dmg" -name "*.dmg" | head -1)

          cp "$ARM_DMG" "/tmp/Huxflux-macos-arm.dmg"
          cp "$X64_DMG" "/tmp/Huxflux-macos-intel.dmg"

          ARM_BUNDLE="$TARGET/aarch64-apple-darwin/release/bundle/macos"
          X64_BUNDLE="$TARGET/x86_64-apple-darwin/release/bundle/macos"
          ARM_TAR="${ARM_BUNDLE}/Huxflux_${VERSION}_aarch64.app.tar.gz"
          X64_TAR="${X64_BUNDLE}/Huxflux_${VERSION}_x64.app.tar.gz"
          (cd "$ARM_BUNDLE" && COPYFILE_DISABLE=1 tar -czf "$ARM_TAR" "Huxflux.app")
          (cd "$X64_BUNDLE" && COPYFILE_DISABLE=1 tar -czf "$X64_TAR" "Huxflux.app")

          cd apps/desktop
          pnpm tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$ARM_TAR"
          pnpm tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$X64_TAR"

          echo "arm_dmg=/tmp/Huxflux-macos-arm.dmg" >> "$GITHUB_OUTPUT"
          echo "x64_dmg=/tmp/Huxflux-macos-intel.dmg" >> "$GITHUB_OUTPUT"
          echo "arm_tar=$ARM_TAR" >> "$GITHUB_OUTPUT"
          echo "x64_tar=$X64_TAR" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            /tmp/Huxflux-macos-arm.dmg
            /tmp/Huxflux-macos-intel.dmg
            ${{ steps.artifacts.outputs.arm_tar }}
            ${{ steps.artifacts.outputs.arm_tar }}.sig
            ${{ steps.artifacts.outputs.x64_tar }}
            ${{ steps.artifacts.outputs.x64_tar }}.sig

  desktop-linux:
    name: Build desktop (Linux)
    runs-on: ubuntu-latest
    if: needs.release.result == 'success' && needs.release.outputs.desktop_changed == 'true'
    needs: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: beta

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject version
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          DESKTOP_VERSION="$VERSION"
          node -e "
            const fs = require('fs');
            const tauriConf = JSON.parse(fs.readFileSync('./apps/desktop/src-tauri/tauri.conf.json', 'utf8'));
            tauriConf.version = '${DESKTOP_VERSION}';
            fs.writeFileSync('./apps/desktop/src-tauri/tauri.conf.json', JSON.stringify(tauriConf, null, 2) + '\n');

            const cargo = fs.readFileSync('./apps/desktop/src-tauri/Cargo.toml', 'utf8');
            fs.writeFileSync('./apps/desktop/src-tauri/Cargo.toml',
              cargo.replace(/^version = \".*\"/m, 'version = \"${DESKTOP_VERSION}\"'));
          "

      - name: Build Linux
        run: cd apps/desktop && pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare artifacts
        id: artifacts
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          TARGET="$GITHUB_WORKSPACE/apps/desktop/src-tauri/target"
          APPIMAGE=$(find "$TARGET/release/bundle/appimage" -name "*.AppImage" | head -1)
          DEB=$(find "$TARGET/release/bundle/deb" -name "*.deb" | head -1)

          cp "$APPIMAGE" "/tmp/Huxflux-linux-x86_64.AppImage"
          cp "$DEB" "/tmp/Huxflux-linux-amd64.deb"

          LINUX_TAR="/tmp/Huxflux_${VERSION}_x86_64.AppImage.tar.gz"
          (cd "$(dirname "$APPIMAGE")" && tar -czf "$LINUX_TAR" "$(basename "$APPIMAGE")")

          cd apps/desktop
          pnpm tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$LINUX_TAR"

          echo "appimage=/tmp/Huxflux-linux-x86_64.AppImage" >> "$GITHUB_OUTPUT"
          echo "deb=/tmp/Huxflux-linux-amd64.deb" >> "$GITHUB_OUTPUT"
          echo "linux_tar=$LINUX_TAR" >> "$GITHUB_OUTPUT"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            /tmp/Huxflux-linux-x86_64.AppImage
            /tmp/Huxflux-linux-amd64.deb
            ${{ steps.artifacts.outputs.linux_tar }}
            ${{ steps.artifacts.outputs.linux_tar }}.sig

  publish-release:
    name: Publish GitHub pre-release
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'success'
    needs: [release, desktop-macos, desktop-linux]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: beta

      - name: Set version
        id: version
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "has_desktop=${{ needs.desktop-macos.result == 'success' }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        if: needs.desktop-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest-beta.json
        if: needs.desktop-macos.result == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "::group::Artifact structure"
          find artifacts -type f 2>/dev/null || echo "No artifacts directory"
          echo "::endgroup::"

          ARM_SIG_FILE=$(find artifacts/macos-artifacts -name "*aarch64.app.tar.gz.sig" 2>/dev/null | head -1)
          X64_SIG_FILE=$(find artifacts/macos-artifacts -name "*x64.app.tar.gz.sig" 2>/dev/null | head -1)
          LINUX_SIG_FILE=$(find artifacts/linux-artifacts -name "*AppImage.tar.gz.sig" 2>/dev/null | head -1)
          ARM_SIG=$([ -f "$ARM_SIG_FILE" ] && cat "$ARM_SIG_FILE" | tr -d '\n' || echo "")
          X64_SIG=$([ -f "$X64_SIG_FILE" ] && cat "$X64_SIG_FILE" | tr -d '\n' || echo "")
          LINUX_SIG=$([ -f "$LINUX_SIG_FILE" ] && cat "$LINUX_SIG_FILE" | tr -d '\n' || echo "")

          [ -z "$ARM_SIG" ] && echo "::warning::macOS ARM signature is empty"
          [ -z "$X64_SIG" ] && echo "::warning::macOS x64 signature is empty"
          [ -z "$LINUX_SIG" ] && echo "::warning::Linux signature is empty"

          printf '{"version":"%s","notes":"","pub_date":"%s","platforms":{"darwin-aarch64":{"signature":"%s","url":"%s/Huxflux_%s_aarch64.app.tar.gz"},"darwin-x86_64":{"signature":"%s","url":"%s/Huxflux_%s_x64.app.tar.gz"},"linux-x86_64":{"signature":"%s","url":"%s/Huxflux_%s_x86_64.AppImage.tar.gz"}}}\n' \
            "$VERSION" "$PUB_DATE" \
            "$ARM_SIG" "$BASE_URL" "$VERSION" \
            "$X64_SIG" "$BASE_URL" "$VERSION" \
            "$LINUX_SIG" "$BASE_URL" "$VERSION" > latest-beta.json

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES="Beta release. Install with: \`npm install -g @minuthq/huxflux@beta\`"

          EXTRA_FILES=""
          STABLE_MANIFEST=$(curl -fsSL "https://github.com/${{ github.repository }}/releases/latest/download/latest.json" 2>/dev/null || echo "")
          if [ -n "$STABLE_MANIFEST" ]; then
            echo "$STABLE_MANIFEST" > latest.json
            EXTRA_FILES="latest.json"
          fi

          if [ -d "artifacts" ]; then
            FILES=$(find artifacts -type f -not -name "*.sig" | tr '\n' ' ')
            SIG_FILES=$(find artifacts -name "*.sig" | tr '\n' ' ')
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Huxflux ${TAG} (beta)" \
              --notes "$NOTES" \
              --prerelease \
              $FILES $SIG_FILES latest-beta.json $EXTRA_FILES
          else
            NOTES="$NOTES"$'\n\n'"Server-only release (no desktop changes)."
            for PTAG in $(gh release list --repo "${{ github.repository }}" --limit 20 --json tagName,isPrerelease -q '.[] | select(.isPrerelease) | .tagName'); do
              PREV_BETA=$(curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${PTAG}/latest-beta.json" 2>/dev/null || echo "")
              if [ -n "$PREV_BETA" ]; then
                echo "$PREV_BETA" > latest-beta.json
                EXTRA_FILES="latest-beta.json ${EXTRA_FILES}"
                break
              fi
            done

            if [ -n "$EXTRA_FILES" ]; then
              gh release create "$TAG" \
                --repo "${{ github.repository }}" \
                --title "Huxflux ${TAG} (beta)" \
                --notes "$NOTES" \
                --prerelease \
                $EXTRA_FILES
            else
              gh release create "$TAG" \
                --repo "${{ github.repository }}" \
                --title "Huxflux ${TAG} (beta)" \
                --notes "$NOTES" \
                --prerelease
            fi
          fi
