name: Promote Beta to Production

on:
  workflow_dispatch:

jobs:
  promote:
    name: Promote beta to main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify branch
        if: github.ref != 'refs/heads/beta'
        run: |
          echo "::error::This workflow must be dispatched from the beta branch, not ${{ github.ref }}"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEVOPS_PAT }}

      - name: Fast-forward main to match beta
        run: |
          BETA_SHA=$(git rev-parse origin/beta)
          MAIN_SHA=$(git rev-parse origin/main)

          if [ "$BETA_SHA" = "$MAIN_SHA" ]; then
            echo "main is already at beta ($BETA_SHA), nothing to do."
            echo "## Already up to date" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git push origin beta:main || {
            echo "::error::Push rejected. main has diverged from beta and cannot be fast-forwarded."
            exit 1
          }

          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "## Promoted to production" >> "$GITHUB_STEP_SUMMARY"
          echo "Fast-forwarded \`main\` to \`beta\` at \`${VERSION}\`." >> "$GITHUB_STEP_SUMMARY"
          echo "The production release workflow will run automatically." >> "$GITHUB_STEP_SUMMARY"
