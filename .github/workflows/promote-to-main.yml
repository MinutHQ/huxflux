name: Promote Beta to Production

on:
  workflow_dispatch:

jobs:
  promote:
    name: Create beta → main PR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/beta'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/server/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create sync branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="promote/v${VERSION}"

          # Check if an open promote PR already exists
          EXISTING=$(gh pr list --base main --state open --json number,headRefName -q '.[] | select(.headRefName | startswith("promote/")) | .number')
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already open — skipping creation"
            echo "https://github.com/${{ github.repository }}/pull/${EXISTING}"
            exit 0
          fi

          # Create a branch that exactly mirrors beta's content
          git checkout -b "$BRANCH" origin/beta
          git push origin "$BRANCH"

          gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "chore: release v${VERSION}" \
            --body "$(cat <<EOF
## Summary
Promote beta to production. Merging triggers the production release workflow.

**Server version:** ${VERSION}

This branch is an exact copy of \`beta\` at the time of promotion, so it will always merge cleanly into \`main\`.
EOF
          )"
